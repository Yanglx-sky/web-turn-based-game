server:
  port: 8080
  servlet:
    context-path: /api

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: game-web
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/game_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
  # 阿里云OSS配置
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    access-key-id: ${ALI_OSS_AK}
    access-key-secret: ${ALI_OSS_SK}
    bucket-name: dorm-repair-system
  # Spring AI 配置
  ai:
    openai:
      api-key: ${API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        model: qwen-turbo
        temperature: 0.7
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 10000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

knife4j:
  enable: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true